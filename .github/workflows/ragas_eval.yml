# P1-5: RAGAS continuous evaluation (chay tay hoac theo lich).
# Can ket noi dich vu that (SQL Server / Qdrant / LLM) -> cau hinh qua Secrets.
name: ragas-eval

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

jobs:
  ragas:
    runs-on: ubuntu-latest
    env:
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      SQL_SERVER: ${{ secrets.SQL_SERVER }}
      SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
      SQL_USERNAME: ${{ secrets.SQL_USERNAME }}
      SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RAGAS_TOLERANCE: "0.05"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run RAGAS eval (gate on regression)
        run: PYTHONPATH=src python scripts/eval/run_ragas_eval.py
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-report
          path: reports/ragas_report.md
